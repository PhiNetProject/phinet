name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --workspace --release

      # The suite covers the parts that fail silently and dangerously — the
      # end-to-end layer, rendezvous authentication, path selection, consensus
      # signing. Several of those tests caught real bugs that compiled fine.
      # This is the gate that matters.
      - name: Test
        run: cargo test --workspace --release

      # Advisory, not a gate: there's a backlog of ~88 lints, and failing every
      # PR on style nobody has triaged yet just trains people to ignore CI.
      # Worth burning down, then promoting to `-D warnings`.
      - name: Clippy (advisory)
        continue-on-error: true
        run: cargo clippy --workspace --all-targets
